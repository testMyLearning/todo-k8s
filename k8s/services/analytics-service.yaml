apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: todo-app
  labels:
    app: analytics-service
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: radiodnov/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://pgbouncer-analytics:5432/analytics_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db_user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db_password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt_secret
            - name: KAFKA_USER
              valueFrom:
                secretKeyRef:
                  name: kafka-secret
                  key: kafka_user
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-secret
                  key: kafka_password
            - name: USER_SERVICE_URL
              value: http://user-service:8081
          volumeMounts:
            - name: config
              mountPath: /common-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: common-config
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: todo-app
  labels:
    app: analytics-service
spec:
  ports:
    - port: 8085
      targetPort: 8085
      name: http
  selector:
    app: analytics-service