apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: todo-app
  labels:
    app: api-gateway
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: radiodnov/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt_secret
            - name: USER_SERVICE_URL
              value: http://user-service:8081
            - name: TASK_SERVICE_URL
              value: http://task-service:8082
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
          volumeMounts:
            - name: config
              mountPath: /common-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: common-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: todo-app
  labels:
    app: api-gateway
spec:
  type: NodePort  # ← ИЗМЕНЕНО: теперь здесь!
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080  # ← порт для доступа снаружи
      name: http
  selector:
    app: api-gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: todo-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080