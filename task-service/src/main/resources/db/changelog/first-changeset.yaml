databaseChangeLog:
  - changeSet:
      id: 1-create-task-table
      author: ivanov
      changes:
        - createTable:
            tableName: testTask
            remarks: 'Таблица задач'
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: version
                  type: BIGINT